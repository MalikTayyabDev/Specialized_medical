# Netlify deploy for STATIC site in /static-site (replicated from Gatsby build)
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm ci --prefix web && npm run build --prefix web && node static-site/scripts/sync-from-gatsby-public.mjs"
  publish = "static-site"
  functions = "netlify/functions"

# PDFs: serve inline so browsers can render inside iframes/embeds on Netlify
[[headers]]
  for = "/documents/*.pdf"
  [headers.values]
    Content-Disposition = "inline"
    X-Content-Type-Options = "nosniff"

# Legacy .jsp URLs → Gatsby routes (single public experience per page)
[[redirects]]
  from = "/about.jsp"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/services.jsp"
  to = "/services/"
  status = 301
  force = true

[[redirects]]
  from = "/faq.jsp"
  to = "/faq/"
  status = 301
  force = true

[[redirects]]
  from = "/contact.jsp"
  to = "/contact/"
  status = 301
  force = true

# Legacy .html URLs → pretty URLs (301)
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about.html"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/services.html"
  to = "/services/"
  status = 301
  force = true

[[redirects]]
  from = "/faq.html"
  to = "/faq/"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/contact/"
  status = 301
  force = true

[[redirects]]
  from = "/clinical-stories.html"
  to = "/clinical-stories/"
  status = 301
  force = true

[[redirects]]
  from = "/thanks.html"
  to = "/thanks/"
  status = 301
  force = true

[[redirects]]
  from = "/services/equipment.html"
  to = "/services/equipment/"
  status = 301
