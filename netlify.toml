# Netlify build for Gatsby app in /web
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "web"
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Legacy .jsp URLs → Gatsby routes (single public experience per page)
[[redirects]]
  from = "/about.jsp"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/services.jsp"
  to = "/services/"
  status = 301
  force = true

[[redirects]]
  from = "/faq.jsp"
  to = "/faq/"
  status = 301
  force = true

[[redirects]]
  from = "/contact.jsp"
  to = "/contact/"
  status = 301
  force = true
